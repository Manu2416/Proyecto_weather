<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/Weather.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body >
    <div class="container-fluid py-5 p-0 m-0">
        <div class="col-12 title ">
            <h1 class="mb-4 p-3 text-center proyecto ">Proyecto Tiempo</h1>
        </div>
        
        <div class="row p-3 m-4">
            <div class="col-md-4">
                <div class="card  p-3 mb-4">
                    <h5>Gestión de Base de Datos</h5>
                    <button onclick="enviar('/insertar_paises')" class="btn mb-2 btn_insertar btn-primary ">Cargar Países</button>
                    <div id="status_db" class="small"></div>
                     <!-- <button onclick="enviar_front('/insertar_fronteras')" class=" btn mb-2 btn_insertar btn-primary">Insertar Fronteras</button>
                    <div id="status_dbf" class="small"></div> -->
                    <h5>Temperaturas</h5>
                    <button onclick="enviar_temps('/insertar_temps')" class=" btn mb-2 btn_insertar btn-primary">Actualizar Temperaturas</button>
                    <div id="status_dbi" class="small"></div>
                    <button onclick="mostrarTablaPaises()" class="mt-2 mb-2 btn btn-primary btn_insertar">
                        Listar Países Guardados
                    </button>
                    <div id="zona-tabla" class="mt-4"></div>
                    
                </div>

            </div>

            <div class="col-md-8">
                <div class="card  p-4">
                    <h5>Análisis por País</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="paisInput" class="form-control" placeholder="Escribe un país...">
                        <button onclick="buscar()" class="btn btn-success">Consultar</button>
                        <div class="text-danger col-12"><p id="error_pais"></p></div>
                    </div>
                    <div id="resultado">
                        </div>
                </div>
            </div>
        </div>
    </div>


<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
